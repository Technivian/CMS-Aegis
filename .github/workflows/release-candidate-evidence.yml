name: Release Candidate Evidence

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release candidate tag or identifier"
        required: true
        type: string

jobs:
  collect-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Prepare evidence output
        run: mkdir -p evidence

      - name: Run platform checks
        run: |
          python manage.py check > evidence/manage-check.txt
          python manage.py test tests.test_cross_tenant_isolation -v 1 > evidence/cross-tenant-tests.txt
          python manage.py test tests.test_performance_guardrails -v 1 > evidence/performance-guardrails.txt
          python manage.py verify_postgres_cutover > evidence/postgres-cutover-evidence.json
          python manage.py generate_release_gate_report --output evidence/release-gate-report.json --fail-on-no-go
          python manage.py generate_sprint3_integration_report --output evidence/sprint3-integration-report.json --fail-on-no-go
          python manage.py generate_esign_integration_report --output evidence/esign-integration-report.json --fail-on-no-go
          python manage.py generate_executive_analytics_evidence --output evidence/executive-analytics-evidence.json
          python manage.py export_retention_audit_actions --output evidence/retention-audit-actions.json

      - name: Capture health and alert snapshots
        run: |
          python manage.py evaluate_observability_alerts --json > evidence/alert-evaluation.json
          python manage.py run_performance_evidence_bundle
          cp "$(ls -t docs/PERFORMANCE_BASELINE_*.json | head -n 1)" evidence/route-latency-core.json
          cp "$(ls -t docs/AUTH_ROUTE_PROFILE_*.json | head -n 1)" evidence/route-latency-auth.json
          cp "$(ls -t docs/LOAD_TEST_2X_*.json | head -n 1)" evidence/load-test-2x.json
          cp "$(ls -t docs/QUERY_PLAN_*.md | head -n 1)" evidence/query-plan.md

      - name: Export and verify tamper-evident compliance bundle
        run: |
          python manage.py export_compliance_evidence_bundle \
            --include evidence/release-gate-report.json \
            --include evidence/sprint3-integration-report.json \
            --include evidence/esign-integration-report.json \
            --include evidence/postgres-cutover-evidence.json \
            --include evidence/executive-analytics-evidence.json \
            --include evidence/retention-audit-actions.json \
            --output-dir evidence > evidence/compliance-evidence-export.json
          python - <<'PY'
          import json
          data = json.load(open("evidence/compliance-evidence-export.json", "r", encoding="utf-8"))
          print(data["bundle_path"])
          print(data["sha256_path"])
          print(data["signature_path"])
          PY
          BUNDLE_PATH=$(python - <<'PY'
          import json
          data = json.load(open("evidence/compliance-evidence-export.json", "r", encoding="utf-8"))
          print(data["bundle_path"])
          PY
          )
          SHA256_PATH=$(python - <<'PY'
          import json
          data = json.load(open("evidence/compliance-evidence-export.json", "r", encoding="utf-8"))
          print(data["sha256_path"])
          PY
          )
          SIGNATURE_PATH=$(python - <<'PY'
          import json
          data = json.load(open("evidence/compliance-evidence-export.json", "r", encoding="utf-8"))
          print(data["signature_path"])
          PY
          )
          python manage.py verify_compliance_evidence_bundle \
            --bundle-path "${BUNDLE_PATH}" \
            --sha256-path "${SHA256_PATH}" \
            --signature-path "${SIGNATURE_PATH}" > evidence/compliance-evidence-verify.json

      - name: Add metadata
        run: |
          echo "release_tag=${{ inputs.release_tag }}" > evidence/metadata.txt
          echo "workflow_run_id=${{ github.run_id }}" >> evidence/metadata.txt
          echo "commit_sha=${{ github.sha }}" >> evidence/metadata.txt

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ inputs.release_tag }}
          path: evidence/
          if-no-files-found: error
