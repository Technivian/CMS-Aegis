name: Retention Jobs Scheduler

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  retention-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DJANGO_ENV: production
      DJANGO_SECRET_KEY: this-is-only-for-ci-not-production-change-me-1234567890
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost
      DEFAULT_FROM_EMAIL: noreply@example.com
      ALLOW_SQLITE_IN_PRODUCTION: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/runtime.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run retention jobs
        run: python manage.py run_retention_jobs > retention-jobs-run.json

      - name: Export retention audit actions
        run: python manage.py export_retention_audit_actions --output retention-audit-actions.json

      - name: Upload retention evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: retention-execution-evidence-${{ github.run_id }}
          path: |
            retention-jobs-run.json
            retention-audit-actions.json
          if-no-files-found: error
