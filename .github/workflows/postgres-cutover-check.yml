name: Postgres Cutover Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  verify-postgres-cutover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DJANGO_ENV: production
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
      CSRF_TRUSTED_ORIGINS: ${{ secrets.CSRF_TRUSTED_ORIGINS }}
      DEFAULT_FROM_EMAIL: ${{ secrets.DEFAULT_FROM_EMAIL }}
      ALLOW_SQLITE_IN_PRODUCTION: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/runtime.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Verify Postgres cutover
        run: python manage.py verify_postgres_cutover > postgres-cutover-evidence.json

      - name: Upload cutover evidence
        uses: actions/upload-artifact@v4
        with:
          name: postgres-cutover-evidence
          path: postgres-cutover-evidence.json
