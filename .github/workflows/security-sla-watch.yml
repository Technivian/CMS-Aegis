name: Security SLA Watch

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  security-sla-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Install Node dependencies
        run: |
          npm --prefix client ci
          npm --prefix theme/static_src ci

      - name: Run security SLA cycle
        id: cycle
        run: |
          mkdir -p security-sla-artifacts
          set +e

          pip-audit --disable-pip --no-deps -r requirements/runtime.txt > security-sla-artifacts/pip_audit.txt 2>&1
          PIP_AUDIT_RC=$?

          bandit -q -r contracts config -lll > security-sla-artifacts/bandit_high.txt 2>&1
          BANDIT_RC=$?

          npm --prefix client audit --audit-level=high --json > security-sla-artifacts/npm_client_audit.json
          NPM_CLIENT_RC=$?

          npm --prefix theme/static_src audit --audit-level=high --json > security-sla-artifacts/npm_theme_audit.json
          NPM_THEME_RC=$?

          OVERALL_RC=0
          if [ "$PIP_AUDIT_RC" -ne 0 ] || [ "$BANDIT_RC" -ne 0 ] || [ "$NPM_CLIENT_RC" -ne 0 ] || [ "$NPM_THEME_RC" -ne 0 ]; then
            OVERALL_RC=1
          fi

          cat > security-sla-artifacts/security_sla_summary.md <<EOF
          # Security SLA Cycle Summary

          - Timestamp (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          - pip-audit exit code: $PIP_AUDIT_RC
          - bandit-high exit code: $BANDIT_RC
          - npm client audit exit code: $NPM_CLIENT_RC
          - npm theme audit exit code: $NPM_THEME_RC
          - overall status: $( [ "$OVERALL_RC" -eq 0 ] && echo PASS || echo FAIL )
          EOF

          echo "exit_code=$OVERALL_RC" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload security SLA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-sla-cycle
          path: security-sla-artifacts
          if-no-files-found: error

      - name: Open or update security SLA issue
        if: steps.cycle.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('security-sla-artifacts/security_sla_summary.md', 'utf8');
            const title = '[Security] SLA Breach Detected';
            const body = [
              'Automated security SLA cycle detected one or more high-severity gate failures.',
              '',
              summary,
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,governance,sla',
              per_page: 50,
            });
            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security', 'governance', 'sla'],
              });
            }

      - name: Fail workflow when SLA breach detected
        if: steps.cycle.outputs.exit_code != '0'
        run: exit 1
