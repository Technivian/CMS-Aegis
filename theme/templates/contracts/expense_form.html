{% extends "base.html" %}
{% block title %}Uitgave toevoegen - Careon{% endblock %}
{% block content %}
<div class="page-wrap page-stack">
    <div class="page-header">
        <h1 class="page-title">Uitgave toevoegen</h1>
    </div>
    <form method="post" class="ds-card action-card page-stack">
        {% csrf_token %}
        <div class="field-group">
            {% for field in form %}
            <div>
                <label class="field-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p style="color:#f87171;font-size:12px;margin-top:4px;">{{ field.errors.0 }}</p>{% endif %}
            </div>
            {% endfor %}
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Uitgave opslaan</button>
            <a href="javascript:history.back()" class="btn btn-secondary">Annuleren</a>
        </div>
    </form>
</div>
{% endblock %}
